<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portfolio Home</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
  }

  /* CONTAINER HOLDS IMAGE + BUTTONS */
  .container {
    position: relative;
    width: 100%;
  }

  /* FULL IMAGE (NO CROPPING) */
  .main-image {
    width: 100%;
    height: auto;
    display: block;
  }

  /* BUTTON LAYER */
  .buttons {
    position: absolute;
    bottom: 5%; /* adjust based on your design */
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 80px;
  }

  /* IMAGE BUTTONS */
  .img-btn {
    width: 120px; /* adjust size */
    cursor: pointer;
    transition: 0.2s;
  }

  .img-btn:hover {
    transform: scale(1.05);
  }

</style>
</head>

<body>

<div class="container">

  <!-- FULL BACKGROUND IMAGE -->
  <img src="PFHome.png" class="main-image">

  <!-- CLICKABLE PNG BUTTONS -->
  <div class="buttons">
    <a href="drawings.html">
      <img src="StickyNote.png" class="img-btn">
    </a>

    <a href="photos.html">
      <img src="Poloroid.png" class="img-btn">
    </a>

    <a href="about.html">
      <img src="PopUp.png" class="img-btn">
    </a>

    <a href="contact.html">
      <img src="PopUp.png" class="img-btn">
    </a>
  </div>

</div>

</body>
</html>
