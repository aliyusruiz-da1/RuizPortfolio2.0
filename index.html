<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portfolio Home</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
  }

  /* MAIN WRAPPER WITH BACKGROUND */
  .wrapper {
    min-height: 200vh; /* enables scrolling */
    display: flex;
    flex-direction: column;
    justify-content: flex-end; /* pushes content to bottom */

    background-image: url("./PoerfolioHomePROTO.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  /* BUTTON SECTION */
  .button-section {
    margin-bottom: 80px; /* space from bottom */
    display: flex;
    justify-content: center;
    gap: 60px;
    flex-wrap: wrap;
  }

  /* BUTTON STYLE */
  .nav-button {
    padding: 14px 28px;
    font-size: 16px;
    background: rgba(0,0,0,0.75);
    color: white;
    border: 2px solid white;
    cursor: pointer;
    transition: 0.25s;
  }

  .nav-button:hover {
    background: white;
    color: black;
  }

</style>
</head>

<body>

<div class="wrapper">

  <div class="button-section">
    <button class="nav-button" onclick="window.location.href='drawings.html'">Drawings</button>
    <button class="nav-button" onclick="window.location.href='photos.html'">Photos</button>
    <button class="nav-button" onclick="window.location.href='about.html'">About</button>
    <button class="nav-button" onclick="window.location.href='contact.html'">Contact</button>
  </div>

</div>

</body>
</html>
