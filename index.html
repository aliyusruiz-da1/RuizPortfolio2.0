<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portfolio Home</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
  }

  /* CONTAINER HOLDS IMAGE + BUTTONS */
  .container {
    position: relative;
    width: 100%;
  }

  /* FULL IMAGE (NO CROPPING) */
  .main-image {
    width: 100%;
    height: auto;
    display: block;
  }

  /* BUTTONS ABSOLUTE POSITIONING */
  .button {
    position: absolute;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .button:hover {
    transform: scale(1.05);
  }

  /* SPECIFIC BUTTON POSITIONS */
  .btn-sticky {
    bottom: 480px; /* distance from bottom */
    left: 12%;     /* adjust horizontally to match sticky note */
    width: 480px;
  }

  .btn-polaroid {
    bottom: 440px;
    left: 30%;     /* center-ish for polaroid */
    width: 480px;
  }

  .btn-popup {
    bottom: 520px;
    left: 70%;     /* adjust to match popup */
    width: 480px;
  }

  /* Bottom-right black button (blends with black triangle) */
  .btn-black {
    bottom: 0;
    right: 0;
    width: 300px;  /* adjust size to cover triangle */
    height: 150px;
    background-color: black;
    border: none;
  }

</style>
</head>

<body>

<div class="container">

  <!-- FULL IMAGE -->
  <img src="PFHome.png" class="main-image">

  <!-- BUTTONS MAPPED TO IMAGE AREAS -->
  <a href="drawings.html">
    <img src="StickyNote.png" class="button btn-sticky">
  </a>

  <a href="photos.html">
    <img src="Poloroid.png" class="button btn-polaroid">
  </a>

  <a href="about.html">
    <img src="PopUp.png" class="button btn-popup">
  </a>

  <!-- Bottom-right invisible black button -->
  <a href="Secret.html">
    <div class="button btn-black"></div>
  </a>

</div>

</body>
</html>
