<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Portfolio Home</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
  }

  /* SCROLLABLE PAGE */
  .page {
    height: 200vh; /* allows scrolling */
    position: relative;
  }

  /* BACKGROUND IMAGE */
  .background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url("PortfolioHomePROTO.png") no-repeat center center;
    background-size: cover;
    z-index: -1;
  }

  /* BUTTON CONTAINER (BOTTOM AREA) */
  .button-container {
    position: absolute;
    bottom: 80px; /* distance from bottom */
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 60px; /* spacing between buttons */
  }

  /* BUTTON STYLE */
  .nav-button {
    padding: 15px 30px;
    font-size: 16px;
    background: rgba(0, 0, 0, 0.7);
    color: white;
    border: 2px solid white;
    cursor: pointer;
    transition: 0.3s;
  }

  .nav-button:hover {
    background: white;
    color: black;
  }

</style>
</head>

<body>

<div class="background"></div>

<div class="page">

  <!-- BUTTONS -->
  <div class="button-container">
    <button class="nav-button" onclick="location.href='drawings.html'">Drawings</button>
    <button class="nav-button" onclick="location.href='photos.html'">Photos</button>
    <button class="nav-button" onclick="location.href='about.html'">About</button>
    <button class="nav-button" onclick="location.href='contact.html'">Contact</button>
  </div>

</div>

</body>
</html>
