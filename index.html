<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portfolio Home</title>

<style>
  /* RESET */
  body {
    margin: 0;
    font-family: Arial, sans-serif;

    /* BACKGROUND IMAGE (MOST RELIABLE METHOD) */
    background-image: url("PortfolioHomePROTO.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    /* ENABLE SCROLL */
    min-height: 200vh;
  }

  /* BUTTON CONTAINER */
  .button-container {
    position: absolute;
    bottom: 100px; /* distance from bottom */
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 80px; /* spacing between buttons */
  }

  /* BUTTON STYLE */
  .nav-button {
    padding: 15px 30px;
    font-size: 16px;
    background: rgba(0, 0, 0, 0.75);
    color: white;
    border: 2px solid white;
    cursor: pointer;
    transition: 0.3s;
  }

  .nav-button:hover {
    background: white;
    color: black;
  }

</style>
</head>

<body>

<!-- BUTTONS -->
<div class="button-container">
  <button class="nav-button" onclick="location.href='drawings.html'">Drawings</button>
  <button class="nav-button" onclick="location.href='photos.html'">Photos</button>
  <button class="nav-button" onclick="location.href='about.html'">About</button>
  <button class="nav-button" onclick="location.href='contact.html'">Contact</button>
</div>

</body>
</html>
