<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>New Gallery</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;

  background: url("PhotoBG.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  min-height: 200vh;
}

/* 🔷 BANNER (NOW SCROLLS WITH PAGE) */
.banner {
  width: 100%;
  height: 200px; /* slightly reduced so it doesn't dominate */
}

.banner img {
  width: 100%;
  height: 100%;
  object-fit: contain; /* shows full image */
}

/* ❌ HOME BUTTON (still fixed) */
.home-btn {
  position: fixed;
  top: 15px;
  right: 20px;
  width: 60px;
  height: 60px;
  z-index: 500; /* LOWER than overlay */
  cursor: pointer;
}

.home-btn img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* CONTENT SPACING */
.content {
  padding-top: 40px;
}

/* ROW LAYOUT */
.row {
  display: flex;
  justify-content: center;
  gap: 120px;
  margin: 150px 0;
  flex-wrap: wrap;
}

/* BUTTON SIZE */
.btn-img {
  width: 450px;
  max-width: 30vw;
  cursor: pointer;
  transition: 0.25s;
}

.btn-img:hover {
  transform: scale(1.08);
}

/* OVERLAY (NOW ALWAYS ON TOP) */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999; /* VERY HIGH → covers banner + button */
}

/* POPUP */
.popup {
  position: relative;
  max-width: 90vw;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.popup img {
  max-width: 90vw;
  max-height: 70vh;
  object-fit: contain;
}

/* TEXTBOX */
.textbox {
  background: white;
  padding: 15px;
  margin-top: 10px;
  max-width: 600px;
  text-align: center;
}

/* CLOSE BUTTON */
.close {
  position: absolute;
  top: -20px;
  right: -20px;
  background: red;
  color: black;
  font-weight: bold;
  width: 40px;
  height: 40px;
  text-align: center;
  line-height: 40px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 🔷 BANNER -->
<div class="banner">
  <img src="Film.png">
</div>

<!-- ❌ HOME BUTTON -->
<a href="index.html" class="home-btn">
  <img src="HomeB.png">
</a>

<div class="content">

<!-- ROW 1 -->
<div class="row">
  <img src="Needle.png" class="btn-img"
  onclick="openPopup('NeedlePU.png','Needle: A self-portrait about my self healing and rediscovery journey, capturing my painful yet benificial development, DSLR camera edited in Lightroom.')">
</div>

<!-- ROW 2 -->
<div class="row">

  <img src="Drank.png" class="btn-img"
  onclick="openPopup('DrankPU.png','Drank: 1/3 A common vice, a mark of celebration and an easy slope for those who seek to escape. DSLR camera edited in Lightroom.')">

  <img src="CIG.png" class="btn-img"
  onclick="openPopup('CIGPU.png','CIG: 2/3 The posterchild of indusry poision, but who can argue against the numbers. DSLR camera edited in Lightroom.')">

  <img src="Nitro.png" class="btn-img"
  onclick="openPopup('NitroPU.png','Nitro: 3/3 Inhale an anyerism or live long enough to be seperated from your nervous system, all in a convenient cylinder. DSLR camera edited in Lightroom.')">

</div>

<!-- ROW 3 -->
<div class="row">

  <img src="Corner.png" class="btn-img"
  onclick="openPopup('CornerPU.png','Corner: 1/3 Usually theres someone on the corner asking for cash or food, beggers come and go but their presence follows us in our minds. DSLR camera edited in Lightroom.')">

  <img src="Cart.png" class="btn-img"
  onclick="openPopup('CartPU.png','Cart: 2/3 Nomads are still among us, but we divide them from humanity based on wealth. May they roam free from our condemnation.DSLR camera edited in Lightroom.')">

  <img src="Belong.png" class="btn-img"
  onclick="openPopup('BelongPU.png','Belong: 3/3 So many things left to be, belongings scattered and abandoned, yet to be utilized to their full potential. Ive seen the same in people. DSLR camera edited in Lightroom')">

</div>

</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="popup" id="popupContent"></div>
</div>

<script>

/* POPUP FUNCTION */
function openPopup(img, text) {
  const overlay = document.getElementById("overlay");
  const popup = document.getElementById("popupContent");

  popup.innerHTML = `
    <div class="close" onclick="closeOverlay()">X</div>
    <img src="${img}">
    <div class="textbox">${text}</div>
  `;

  overlay.style.display = "flex";
}

/* CLOSE */
function closeOverlay() {
  document.getElementById("overlay").style.display = "none";
}

</script>

</body>
</html>
